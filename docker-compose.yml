services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      # ภายใน network ของ compose ใช้ชื่อ service แทน localhost (override ค่าใน .env)
      DATABASE_URL: mysql://km:${MYSQL_PASSWORD:-kmpass}@mysql:3306/km_ppch
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-kmroot}
      MYSQL_DATABASE: km_ppch
      MYSQL_USER: km
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kmpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      - mysql

volumes:
  mysql_data:
  redis_data:
